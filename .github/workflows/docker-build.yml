name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'spring-boot-app-manifests/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java (because you are building Spring Boot with Maven)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Build Maven project
      - name: Build with Maven
        run: |
          cd spring-boot-app
          mvn clean package -DskipTests

      # 4. Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/ultimate-cicd:${{ github.sha }} \
            spring-boot-app

      # 6. Push Docker image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ultimate-cicd:${{ github.sha }}

      # 7. Update ArgoCD manifests repo
      - name: Update manifest repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/jeetkansagra/jenkins-pipeline.git

          cd jenkins-pipeline/spring-boot-app-manifests

          sed -i "s|image: .*|image: jeetkansagra07/ultimate-cicd:${GITHUB_SHA}|" deployment.yml

          cd ..

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add spring-boot-app-manifests/deployment.yml

          git commit -m "Update image to ${GITHUB_SHA}" || exit 0

          echo "==== REMOTES BEFORE ===="
          git remote -v

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/jeetkansagra/jenkins-pipeline.git

          echo "==== REMOTES AFTER ===="
          git remote -v

          git push origin main
