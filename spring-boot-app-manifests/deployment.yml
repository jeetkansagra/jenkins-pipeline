apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
  labels:
    app: spring-boot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
    spec:
      containers:
      - name: spring-boot-app
        image: jeetkansagra07/ultimate-cicd:7ad2d37e88eca80355a7af5ed70efe05a1cac88c
        ports:
        - containerPort: 8080