apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
  labels:
    app: spring-boot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
    spec:
      containers:
      - name: spring-boot-app
        image: jeetkansagra07/ultimate-cicd:398c89af6f2ca8676c4e3dcf1a679a7b5852797b
        ports:
        - containerPort: 8080